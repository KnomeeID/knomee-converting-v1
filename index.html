<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1100">
<title>Knomee — Convert prototype</title>
<style>
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:#1a0f2e; font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:#eee; }

  .stage {
    padding:24px 16px 60px;
    display:flex; justify-content:center;
  }

  .frame {
    position:relative; width:100%; max-width:1100px;
    background:#fff; border-radius:8px; overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .frame img.dashboard { display:block; width:100%; height:auto; user-select:none; -webkit-user-drag:none; }

  /* Hotspot on Sarah's ⚡ button. Frame is 1728×2657. ⚡ icon at x 1466–1506, y 641.87–683.58. */
  .bolt-hotspot {
    position:absolute;
    left:84.84%; top:24.16%; width:2.31%; height:1.58%;
    cursor:pointer; border-radius:6px;
    background:transparent; transition:background .15s, outline .15s;
  }
  .bolt-hotspot:hover { background:rgba(90,44,138,.18); outline:2px solid #5a2c8a; }
  body.hint .bolt-hotspot {
    background:rgba(90,44,138,.22);
    outline:2px dashed rgba(90,44,138,.85);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{outline-color:rgba(90,44,138,.4);} 50%{outline-color:rgba(90,44,138,.95);} }

  /* Modal overlay — centered on the frame, hidden by default */
  .modal-overlay {
    position:absolute; inset:0;
    display:none; align-items:center; justify-content:center;
    background:rgba(20,10,40,.45);
    z-index:50;
  }
  .modal-overlay.open { display:flex; }
  .modal-card {
    width:30%; min-width:360px; max-width:500px;
    aspect-ratio:500/238;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    border-radius:8px; overflow:hidden;
    background:#fff;
    position:relative;
  }
  .modal-card img { width:100%; height:auto; display:block; pointer-events:none; }

  /* Modal hotspots — % of modal card 500x238 */
  .modal-card .hot {
    position:absolute; cursor:pointer; border-radius:6px;
    transition:background .15s;
  }
  .modal-card .hot:hover { background:rgba(90,44,138,.12); }
  body.hint .modal-card .hot {
    background:rgba(90,44,138,.14);
    outline:1px dashed rgba(90,44,138,.85);
  }

  /* Tiny floating help button */
  .hint-toggle {
    position:fixed; right:16px; bottom:16px; z-index:1000;
    background:#5a2c8a; color:#fff; border:none;
    padding:8px 14px; border-radius:24px; cursor:pointer;
    font:inherit; box-shadow:0 6px 20px rgba(0,0,0,.4);
  }
  .hint-toggle:hover { background:#6e3aa6; }
</style>
</head>
<body>

<div class="stage">
  <div class="frame">
    <img class="dashboard" src="screens/dashboard.png" alt="Prospects Dashboard">
    <a class="bolt-hotspot" id="bolt" title="Convert Sarah Mitchell"></a>

    <div class="modal-overlay" id="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-label="Convert to Client">
        <img src="screens/modal.png" alt="Convert to Client">
        <!--
          Modal is 500x238. Internal positions:
          - Close X: instance at (454.4, 7.2) inside Frame at y=12 → absolute (454.4, 19.2), size 21.6x21.6
          - Cancel button: Frame 1171276946 at (228, 0) inside Frame 1171277310 at y=29 inside Frame 1171277516 at y=129
            → absolute (228, 158), size 114x51
          - Convert button: Frame 1171276945 at (354, 0) inside same parent → absolute (354, 158), size 122x51
        -->
        <a class="hot" id="modal-close"
           style="left:90.88%; top:8.07%; width:4.32%; height:9.07%;" title="Close"></a>
        <a class="hot" data-close
           style="left:45.6%; top:66.4%; width:22.8%; height:21.4%;" title="Cancel"></a>
        <a class="hot" data-close
           style="left:70.8%; top:66.4%; width:24.4%; height:21.4%;" title="Convert"></a>
      </div>
    </div>
  </div>
</div>

<button class="hint-toggle" id="hint-toggle" title="Toggle hotspot highlights (H)">Show hotspot</button>

<script>
  const modal = document.getElementById('modal');
  const bolt  = document.getElementById('bolt');

  function openModal() { modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); }
  function closeModal(){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); }

  bolt.addEventListener('click', e => { e.preventDefault(); openModal(); });

  // Any element marked data-close (Cancel / Convert), or the X, or backdrop click closes the modal
  modal.addEventListener('click', e => {
    if (e.target === modal) { closeModal(); return; }
    if (e.target.closest('[data-close]') || e.target.id === 'modal-close') {
      e.preventDefault(); closeModal();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'h' || e.key === 'H') document.getElementById('hint-toggle').click();
  });

  document.getElementById('hint-toggle').addEventListener('click', () => {
    const on = document.body.classList.toggle('hint');
    document.getElementById('hint-toggle').textContent = on ? 'Hide hotspot' : 'Show hotspot';
  });
</script>
</body>
</html>
